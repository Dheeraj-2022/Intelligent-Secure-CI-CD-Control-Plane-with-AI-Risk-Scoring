# =============================================================================
# Prometheus Helm Values — kube-prometheus-stack
# Chart: prometheus-community/kube-prometheus-stack
# =============================================================================

# ─── Global ───────────────────────────────────────────────────────────────────
fullnameOverride: "prometheus"

# ─── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  enabled: true

  prometheusSpec:
    # Retain 30 days of metrics
    retention: 30d
    retentionSize: "50GB"

    resources:
      requests:
        cpu:    "500m"
        memory: "2Gi"
      limits:
        cpu:    "2000m"
        memory: "8Gi"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi

    # Scrape all ServiceMonitors/PodMonitors regardless of namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Additional scrape configs for Jenkins and SonarQube
    additionalScrapeConfigs:
      - job_name: "jenkins"
        metrics_path: "/prometheus"
        static_configs:
          - targets:
              - "jenkins.jenkins.svc.cluster.local:8080"
        scrape_interval: 30s

      - job_name: "sonarqube"
        metrics_path: "/api/monitoring/metrics"
        static_configs:
          - targets:
              - "sonarqube.sonarqube.svc.cluster.local:9000"
        scrape_interval: 60s

      - job_name: "sample-app"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["default", "production", "dev"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: "([^:]+)(?::\\d+)?;(\\d+)"
            replacement: "$1:$2"
            target_label: __address__

    # Alert rules from files
    additionalPrometheusRulesMap:
      pipeline-rules:
        groups: []  # Populated by pipeline-alerts.yaml ConfigMap

  # Expose Prometheus UI
  service:
    type: ClusterIP

# ─── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  enabled: true

  alertmanagerSpec:
    resources:
      requests:
        cpu:    "100m"
        memory: "128Mi"
      limits:
        cpu:    "200m"
        memory: "256Mi"

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "{{ .Values.slackWebhookUrl }}"

    route:
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "slack-critical"
      routes:
        - match:
            severity: critical
          receiver: "slack-critical"
          continue: true
        - match:
            severity: warning
          receiver: "slack-warnings"

    receivers:
      - name: "slack-critical"
        slack_configs:
          - channel: "#cicd-alerts"
            send_resolved: true
            title: "🚨 [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: |-
              *Severity:* {{ .CommonLabels.severity }}
              *Namespace:* {{ .CommonLabels.namespace }}
              {{ range .Alerts }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

      - name: "slack-warnings"
        slack_configs:
          - channel: "#cicd-warnings"
            send_resolved: true
            title: "⚠️ [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: |-
              {{ range .Alerts }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

# ─── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "changeme"  # Override via Helm --set or secret

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi

  resources:
    requests:
      cpu:    "100m"
      memory: "256Mi"
    limits:
      cpu:    "500m"
      memory: "512Mi"

  grafana.ini:
    server:
      domain: grafana.example.com
      root_url: "%(protocol)s://%(domain)s/"
    auth:
      disable_login_form: false
    security:
      allow_embedding: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: cicd
          orgId: 1
          folder: "CI/CD"
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/cicd

  dashboardsConfigMaps:
    cicd: "grafana-dashboards-cicd"

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

# ─── Node Exporter ────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── Kube State Metrics ───────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ─── Default rules ────────────────────────────────────────────────────────────
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
